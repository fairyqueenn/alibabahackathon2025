version: '3.8'

services:
  # Layanan aplikasi Python Anda
  web:
    build:
      context: . # Konteks build (direktori tempat Dockerfile berada)
      dockerfile: Dockerfile # Nama Dockerfile
    ports:
      - "8000:8000" # Memetakan port host:kontainer
    volumes:
      - .:/app # Mount kode lokal ke dalam kontainer untuk pengembangan
    env_file:
      - .env
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/mydatabase

  # Layanan database PostgreSQL
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mydatabase
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
