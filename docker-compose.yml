version: '3.8'

services:
  # Layanan aplikasi Python Anda
  web:
    build:
      context: . # Konteks build (direktori tempat Dockerfile berada)
      dockerfile: Dockerfile # Nama Dockerfile
    ports:
      - "8000:8000" # Memetakan port host:kontainer
    volumes:
      - .:/app # Mount kode lokal ke dalam kontainer untuk pengembangan
    env_file:
      - .env
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/mydatabase

  # Layanan database PostgreSQL
  db:
    image: pgvector/pgvector:pg15
    container_name: my-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Optional: Add initialization script to enable extension
    command: >
      bash -c "
      docker-entrypoint.sh postgres &
      sleep 10 &&
      PGPASSWORD=postgres psql -h localhost -U postgres -d mydatabase -c 'CREATE EXTENSION IF NOT EXISTS vector;' &&
      wait
      "

volumes:
  postgres_data:
